name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false,
              "MD024": false
            }

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail --exclude 'localhost' --exclude '127.0.0.1' '**/*.md'
          fail: true
