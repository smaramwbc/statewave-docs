name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude 'localhost' --exclude '127.0.0.1' '**/*.md'
          fail: true
