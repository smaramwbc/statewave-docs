name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          # `platform.openai.com` is excluded because their bot detection
          # rejects any link checker with a 403 — the URL is fine in a
          # browser, just unverifiable from CI.
          args: --no-progress --exclude 'localhost' --exclude '127.0.0.1' --exclude 'statewave.ai' --exclude 'platform.openai.com' '**/*.md'
          fail: true
